# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# Everforest theme (reads ~/.config/colormode: "dark" or "light")
if-shell '[ "$(cat ~/.config/colormode 2>/dev/null)" = "dark" ]' {
  set -g status-style "fg=#d3c6aa,bg=#323d43"
  set -g status-left "#[fg=#323d43,bg=#a7c080,bold] #S #[fg=#a7c080,bg=#323d43,nobold] "
  set -g window-status-format "#[fg=#7a8478] #I:#W "
  set -g window-status-current-format "#[fg=#a7c080,bold] #I:#W "
  set -g pane-border-style "fg=#3d484d"
  set -g pane-active-border-style "fg=#a7c080"
  set -g message-style "fg=#d3c6aa,bg=#3d484d"
} {
  set -g status-style "fg=#5c6a72,bg=#f9f5d7"
  set -g status-left "#[fg=#f9f5d7,bg=#8da101,bold] #S #[fg=#8da101,bg=#f9f5d7,nobold] "
  set -g window-status-format "#[fg=#a6b0a0] #I:#W "
  set -g window-status-current-format "#[fg=#8da101,bold] #I:#W "
  set -g pane-border-style "fg=#edeada"
  set -g pane-active-border-style "fg=#8da101"
  set -g message-style "fg=#5c6a72,bg=#edeada"
}
set -g status-right ""
set -g window-status-separator ""
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# Continuum: auto-save and restore sessions
set -g @continuum-restore 'on'

# Enable mouse support
set -g mouse on

# Remap prefix from 'C-b' to 'C-Space'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config keybinding.
bind r source-file ~/.config/tmux/tmux.conf

# don't rename windows automatically
set-option -g allow-rename off

# Move between panes with Prefix + h,j,k,l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
