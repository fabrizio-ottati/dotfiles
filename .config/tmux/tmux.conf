# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# Kanagawa wave status bar
set -g status-style "fg=#dcd7ba,bg=#1f1f28"
set -g status-left "#[fg=#1f1f28,bg=#7e9cd8,bold] #S #[fg=#7e9cd8,bg=#1f1f28,nobold] "
set -g status-right ""
set -g window-status-format "#[fg=#727169] #I:#W "
set -g window-status-current-format "#[fg=#7e9cd8,bold] #I:#W "
set -g window-status-separator ""
set -g pane-border-style "fg=#2a2a37"
set -g pane-active-border-style "fg=#7e9cd8"
set -g message-style "fg=#dcd7ba,bg=#2a2a37"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# Continuum: auto-save and restore sessions
set -g @continuum-restore 'on'

# Enable mouse support
set -g mouse on

# Remap prefix from 'C-b' to 'C-Space'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config keybinding.
bind r source-file ~/.config/tmux/tmux.conf

# don't rename windows automatically
set-option -g allow-rename off

# Move between panes with Prefix + h,j,k,l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
