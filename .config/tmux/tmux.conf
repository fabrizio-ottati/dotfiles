# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# Kanagawa lotus status bar
set -g status-style "fg=#545464,bg=#f2ecbc"
set -g status-left "#[fg=#f2ecbc,bg=#4d699b,bold] #S #[fg=#4d699b,bg=#f2ecbc,nobold] "
set -g status-right ""
set -g window-status-format "#[fg=#a09cac] #I:#W "
set -g window-status-current-format "#[fg=#4d699b,bold] #I:#W "
set -g window-status-separator ""
set -g pane-border-style "fg=#d5cea3"
set -g pane-active-border-style "fg=#4d699b"
set -g message-style "fg=#545464,bg=#d5cea3"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# Continuum: auto-save and restore sessions
set -g @continuum-restore 'on'

# Enable mouse support
set -g mouse on

# Remap prefix from 'C-b' to 'C-Space'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config keybinding.
bind r source-file ~/.config/tmux/tmux.conf

# don't rename windows automatically
set-option -g allow-rename off

# Move between panes with Prefix + h,j,k,l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
